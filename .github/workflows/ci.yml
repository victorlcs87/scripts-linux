name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Instalar dependencias
        run: pip install -e .[dev]

      - name: Ruff (lint)
        run: ruff check .

      - name: Ruff (format)
        run: ruff format --check .

      - name: Verificar sintaxe (py_compile)
        run: python -m py_compile 00-pos-formatacao-cachyos.py reforja/*.py reforja/steps/*.py reforja/gui/*.py

      - name: Testes + cobertura
        run: python -m pytest --cov=reforja --cov-report=term-missing

  release:
    # Publica um AppImage executavel a cada push na main, apos o gate de testes.
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Dependencias de runtime do Qt (para os testes offscreen)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 libxcb-cursor0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0

      - name: Instalar projeto + GUI + PyInstaller
        run: pip install -e .[dev,gui] pytest-qt pyinstaller

      - name: Definir versao do build
        id: ver
        run: |
          VERSION="1.0.${{ github.run_number }}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "__version__ = \"${VERSION}\"" > reforja/gui/_version.py

      - name: Smoke test da GUI (offscreen)
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest tests/test_gui.py -q

      - name: Construir AppImage
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          UPDATE_INFO: gh-releases-zsync|victorlcs87|scripts-linux|latest|Reforja-*-x86_64.AppImage.zsync
        run: bash packaging/build-appimage.sh

      - name: Gerar SHA256SUMS
        working-directory: dist
        run: sha256sum Reforja-*-x86_64.AppImage* > SHA256SUMS

      - name: Publicar release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: Reforja v${{ steps.ver.outputs.version }}
          make_latest: true
          generate_release_notes: true
          files: |
            dist/Reforja-*-x86_64.AppImage
            dist/Reforja-*-x86_64.AppImage.zsync
            dist/SHA256SUMS
