name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Instalar dependencias
        run: pip install -e .[dev]

      - name: Ruff (lint)
        run: ruff check .

      - name: Ruff (format)
        run: ruff format --check .

      - name: Verificar sintaxe (py_compile)
        run: python -m py_compile 00-pos-formatacao-cachyos.py postformat/*.py postformat/steps/*.py

      - name: Testes + cobertura
        run: python -m pytest --cov=postformat --cov-report=term-missing
